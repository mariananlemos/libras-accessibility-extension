<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0078D4"/>
      <stop offset="100%" style="stop-color:#005A9E"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="20" fill="url(#bgGrad)"/>
  <g fill="white">
    <!-- Avatar estilizado fazendo sinal -->
    <circle cx="64" cy="40" r="18" fill="white"/>
    <ellipse cx="64" cy="85" rx="22" ry="28" fill="white"/>
    <!-- Braço esquerdo levantado -->
    <path d="M42 70 Q30 55 35 40" stroke="white" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- Mão esquerda -->
    <circle cx="35" cy="38" r="8" fill="white"/>
    <!-- Braço direito -->
    <path d="M86 70 Q98 65 100 55" stroke="white" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- Mão direita -->
    <circle cx="100" cy="53" r="8" fill="white"/>
  </g>
  <text x="64" y="122" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">LIBRAS</text>
</svg>
