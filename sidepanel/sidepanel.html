<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tradutor Libras</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-title">
      <span class="header-icon">🤟</span>
      <h1>Tradutor Libras</h1>
    </div>
    <div class="header-status">
      <span id="status-indicator" class="status-dot status-connected"></span>
      <span id="status-text">Aguardando legendas...</span>
    </div>
  </header>

  <!-- Container principal -->
  <main class="main-content">
    <!-- Area do VLibras via iframe -->
    <section class="vlibras-section">
      <iframe 
        id="vlibras-frame"
        src="https://vlibras.gov.br/app" 
        title="VLibras Tradutor"
        allow="autoplay"
        sandbox="allow-scripts allow-same-origin allow-popups"
      ></iframe>
      <div class="vlibras-overlay" id="vlibras-overlay">
        <p>Clique em "Traduzir" para enviar o texto ao VLibras</p>
      </div>
    </section>

    <!-- Area da legenda atual -->
    <section class="caption-section">
      <div class="caption-header">
        <span class="caption-label">Legenda atual:</span>
        <span id="speaker-name" class="speaker-name"></span>
      </div>
      <div id="current-caption" class="current-caption" tabindex="0">
        <p class="caption-placeholder">As legendas aparecerao aqui quando voce ativar as legendas na sua reuniao.</p>
      </div>
    </section>

    <!-- Historico de legendas -->
    <section class="history-section">
      <div class="history-header">
        <span class="history-label">Historico</span>
        <button id="clear-history" class="btn-clear" title="Limpar historico">🗑️</button>
      </div>
      <div id="caption-history" class="caption-history">
        <!-- Legendas anteriores aparecerao aqui -->
      </div>
    </section>
  </main>

  <!-- Footer com acoes -->
  <footer class="footer">
    <div class="footer-info">
      <span id="platform-info">Plataforma: --</span>
    </div>
    <div class="footer-actions">
      <button id="btn-translate" class="btn-action" title="Abrir VLibras para traduzir">
        🤟 Traduzir no VLibras
      </button>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="sidepanel.js"></script>
</body>
</html>
