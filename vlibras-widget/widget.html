<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VLibras Widget</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #e8e8e8;
    }

    body {
      display: flex;
      flex-direction: column;
      font-family: 'Google Sans', 'Roboto', Arial, sans-serif;
    }

    /* Esconde o botão de acesso padrão do VLibras */
    [vw-access-button] {
      display: none !important;
    }

    /* Ajusta o wrapper do plugin para ocupar toda a área */
    [vw] {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      right: 0 !important;
      bottom: 50px !important;
      width: 100% !important;
      height: calc(100% - 50px) !important;
      margin: 0 !important;
    }

    [vw-plugin-wrapper] {
      width: 100% !important;
      height: 100% !important;
      position: absolute !important;
      top: 0 !important;
      left: 0 !important;
      border-radius: 0 !important;
      box-shadow: none !important;
    }

    .vw-plugin-top-wrapper {
      display: none !important;
    }

    /* Área de texto para tradução */
    #caption-area {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 50px;
      background: #f5f5f5;
      border-top: 1px solid #ddd;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
    }

    #caption-text {
      flex: 1;
      font-size: 13px;
      color: #333;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      user-select: text;
    }

    #caption-text.placeholder {
      color: #888;
      font-style: italic;
    }

    #status-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #FFC107;
      flex-shrink: 0;
    }

    #status-indicator.ready {
      background: #4CAF50;
    }

    #status-indicator.error {
      background: #f44336;
    }
  </style>
</head>
<body>
  <!-- VLibras container -->
  <div vw class="enabled">
    <div vw-access-button class="active"></div>
    <div vw-plugin-wrapper>
      <div class="vw-plugin-top-wrapper"></div>
    </div>
  </div>

  <!-- Área de legenda -->
  <div id="caption-area">
    <span id="status-indicator"></span>
    <span id="caption-text" class="placeholder">Aguardando texto...</span>
  </div>

  <!-- VLibras Script - carrega externamente -->
  <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
  
  <script>
    // Estado do widget
    const widgetState = {
      isReady: false,
      currentAvatar: 'icaro',
      lastText: ''
    };

    // Elementos DOM
    const captionText = document.getElementById('caption-text');
    const statusIndicator = document.getElementById('status-indicator');

    // Inicializa o VLibras
    function initVLibras() {
      try {
        if (typeof VLibras !== 'undefined') {
          new VLibras.Widget('https://vlibras.gov.br/app');
          console.log('[VLibras Widget] Inicializado');
          
          // Verifica quando estiver pronto
          checkReady();
        } else {
          console.error('[VLibras Widget] VLibras não encontrado');
          showError();
        }
      } catch (error) {
        console.error('[VLibras Widget] Erro:', error);
        showError();
      }
    }

    // Verifica se o VLibras está pronto
    function checkReady() {
      let attempts = 0;
      const maxAttempts = 30;

      const interval = setInterval(() => {
        attempts++;
        const vwWrapper = document.querySelector('[vw-plugin-wrapper]');
        const hasPlayer = vwWrapper && (
          vwWrapper.querySelector('canvas') || 
          vwWrapper.querySelector('iframe') ||
          vwWrapper.querySelector('[vp]')
        );

        if (hasPlayer || window.plugin) {
          clearInterval(interval);
          onReady();
        } else if (attempts >= maxAttempts) {
          clearInterval(interval);
          // Assume que está pronto mesmo assim
          onReady();
        }
      }, 500);
    }

    // VLibras pronto
    function onReady() {
      widgetState.isReady = true;
      statusIndicator.classList.add('ready');
      console.log('[VLibras Widget] Pronto!');
      notifyParent({ type: 'ready' });
    }

    // Mostra erro
    function showError() {
      statusIndicator.classList.add('error');
      notifyParent({ type: 'error', message: 'Falha ao carregar VLibras' });
    }

    // Traduz texto usando seleção (método que funciona!)
    function translate(text) {
      if (!text || text.trim().length < 2) return;

      console.log('[VLibras Widget] Traduzindo:', text);
      widgetState.lastText = text;

      // Atualiza display
      captionText.textContent = text;
      captionText.classList.remove('placeholder');

      // Método 1: Tenta usar plugin.translate diretamente
      if (window.plugin && window.plugin.translate) {
        window.plugin.translate(text);
        return;
      }

      // Método 2: Simula seleção de texto (funciona com VLibras)
      try {
        // Abre o widget VLibras se estiver fechado
        const accessBtn = document.querySelector('[vw-access-button]');
        if (accessBtn) {
          accessBtn.click();
        }

        // Aguarda um pouco e seleciona o texto
        setTimeout(() => {
          // Seleciona o texto da legenda
          const range = document.createRange();
          range.selectNodeContents(captionText);
          const sel = window.getSelection();
          sel.removeAllRanges();
          sel.addRange(range);

          // Dispara eventos para o VLibras detectar
          document.dispatchEvent(new Event('selectionchange'));
          captionText.dispatchEvent(new MouseEvent('mouseup', { bubbles: true }));
        }, 200);
      } catch (error) {
        console.error('[VLibras Widget] Erro ao traduzir:', error);
      }

      notifyParent({ type: 'translating', text: text });
    }

    // Muda avatar
    function changeAvatar(avatarName) {
      console.log('[VLibras Widget] Mudando avatar:', avatarName);
      widgetState.currentAvatar = avatarName;

      if (window.plugin && window.plugin.changeAvatar) {
        window.plugin.changeAvatar(avatarName);
      }
    }

    // Notifica o parent
    function notifyParent(message) {
      try {
        window.parent.postMessage({
          source: 'vlibras-widget',
          ...message
        }, '*');
      } catch (error) {
        console.error('[VLibras Widget] Erro ao notificar:', error);
      }
    }

    // Escuta mensagens do parent
    window.addEventListener('message', (event) => {
      const data = event.data;
      if (!data || data.source === 'vlibras-widget') return;

      console.log('[VLibras Widget] Mensagem:', data);

      switch (data.type) {
        case 'translate':
          translate(data.text);
          break;
        case 'changeAvatar':
          changeAvatar(data.avatar);
          break;
        case 'ping':
          notifyParent({ type: 'pong', ready: widgetState.isReady });
          break;
      }
    });

    // Inicializa quando o script do VLibras carregar
    if (typeof VLibras !== 'undefined') {
      initVLibras();
    } else {
      // Aguarda o script carregar
      window.addEventListener('load', () => {
        setTimeout(initVLibras, 500);
      });
    }
  </script>
</body>
</html>
