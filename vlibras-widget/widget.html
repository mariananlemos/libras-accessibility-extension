<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VLibras Widget</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    body {
      display: flex;
      flex-direction: column;
      font-family: 'Google Sans', 'Roboto', Arial, sans-serif;
    }

    /* VLibras container */
    #vlibras-container {
      flex: 1;
      position: relative;
      background: #e8e8e8;
      min-height: 200px;
    }

    /* Esconde o botão de acesso padrão do VLibras */
    [vw-access-button] {
      display: none !important;
    }

    /* Ajusta o wrapper do plugin */
    [vw] {
      position: absolute !important;
      top: 0 !important;
      left: 0 !important;
      right: 0 !important;
      bottom: 0 !important;
      width: 100% !important;
      height: 100% !important;
      margin: 0 !important;
    }

    [vw-plugin-wrapper] {
      width: 100% !important;
      height: 100% !important;
      position: absolute !important;
      top: 0 !important;
      left: 0 !important;
      border-radius: 0 !important;
      box-shadow: none !important;
    }

    .vw-plugin-top-wrapper {
      display: none !important;
    }

    /* Loading state */
    .loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #e8e8e8;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
      transition: opacity 0.3s;
    }

    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #ddd;
      border-top-color: #0078D4;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      color: #666;
      font-size: 13px;
    }

    /* Error state */
    .error-message {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #fff3cd;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      text-align: center;
      z-index: 101;
    }

    .error-message.visible {
      display: flex;
    }

    .error-icon {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .error-text {
      color: #856404;
      font-size: 12px;
      line-height: 1.4;
    }

    /* Caption display - onde o texto fica para o VLibras detectar */
    #caption-display {
      background: #f5f5f5;
      padding: 10px 12px;
      border-top: 1px solid #e0e0e0;
      min-height: 50px;
      max-height: 70px;
      overflow-y: auto;
    }

    #caption-text {
      font-size: 13px;
      color: #333;
      line-height: 1.4;
      user-select: text;
    }

    #caption-text.placeholder {
      color: #888;
      font-style: italic;
    }

    /* Status indicator */
    #status-bar {
      background: #0078D4;
      color: white;
      padding: 6px 12px;
      font-size: 11px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4CAF50;
      margin-right: 6px;
      display: inline-block;
    }

    .status-dot.loading {
      background: #FFC107;
      animation: pulse 1s infinite;
    }

    .status-dot.error {
      background: #f44336;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
</head>
<body>
  <!-- Status bar -->
  <div id="status-bar">
    <span><span id="status-dot" class="status-dot loading"></span><span id="status-text">Carregando...</span></span>
    <span id="avatar-name">Ícaro</span>
  </div>

  <!-- VLibras container -->
  <div id="vlibras-container">
    <div class="loading-overlay" id="loading-overlay">
      <div class="spinner"></div>
      <span class="loading-text">Carregando VLibras...</span>
    </div>

    <div class="error-message" id="error-message">
      <span class="error-icon">⚠️</span>
      <span class="error-text">Erro ao carregar VLibras.<br>Tente recarregar a página.</span>
    </div>

    <!-- VLibras será injetado aqui -->
    <div vw class="enabled">
      <div vw-access-button class="active"></div>
      <div vw-plugin-wrapper>
        <div class="vw-plugin-top-wrapper"></div>
      </div>
    </div>
  </div>

  <!-- Caption display - texto para tradução -->
  <div id="caption-display">
    <span id="caption-text" class="placeholder">Aguardando texto...</span>
  </div>

  <!-- VLibras Script - carregado externamente -->
  <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
  <script src="widget.js"></script>
</body>
</html>
